            - text: "• Testy jednostkowe (JUnit / Spock) • Znajomość zasad programowania i dobrych praktyk • Znajomość wzorców projektowych Mile widziane (nice to have): • Jenkins lub GitLab CI • OpenShift /"
            - mark [ref=e1473]: Kubernetes
            - text: "• Jira, Confluence, Scrum • Camunda BPMS • Narzędzia monitoringu i observability: Grafana, Kibana, Dynatrace Co oferujemy: • Długofalową współpracę przy stabilnych projektach • Pracę w doświadczonym zespole i realny wpływ na rozwiązania techniczne • Elastyczną formę współpracy • Budżet szkoleniowy i dostęp do platform edukacyjnych • Prywatną opiekę medyczną i kartę sportową • Przyjazną, partnerską kulturę organizacyjną Proces rekrutacyjny: • Rozmowa z Rekruterem • Rozmowa techniczna z zespołem • Decyzja i oferta"