          - generic [ref=e1465]: Description
          - generic [ref=e1466]:
            - text: "Kim jesteśmy Billennium to polska firma IT z ponad 20-letnim doświadczeniem, realizująca projekty technologiczne dla klientów z sektora finansowego, ubezpieczeniowego, publicznego i e‑commerce. Tworzymy zespoły ekspertów, którzy rozwijają nowoczesne rozwiązania w oparciu o sprawdzone metodyki i najnowsze technologie. Pracodawca wymaga wizyt w biurze raz na dwa/trzy tygodnie. Biura znajdują się w Warszawie, Krakowie oraz Katowicach. O roli Dołączysz do zespołu rozwijającego Workflow Kredytowy w obszarze Finansowania Biznesu. Będziesz pracować nad backendem nowoczesnego systemu opartego na architekturze mikroserwisowej, w ścisłej współpracy z Product Ownerem i zespołem Scrumowym. Zakres obowiązków: • Projektowanie, rozwój i utrzymanie aplikacji backendowych • Integracje pomiędzy systemami • Optymalizacja wydajności aplikacji • Wsparcie zespołu w zakresie jakości kodu i decyzji technicznych • Praca z architekturą mikroserwisową • Aktywny udział w pracach zespołu Scrumowego (ciągłe wsparcie PO) Wymagania (must have): • Minimum kilkuletnie doświadczenie komercyjne w Javie •"
            - mark [ref=e1467]: Java
            - text: 21+ •
