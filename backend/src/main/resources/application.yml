spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:jrawler_db}
    username: ${POSTGRES_USER:jrawler_user}
    password: ${POSTGRES_PASSWORD:supersecret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 3MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

  # spring.jackson.* legacy flags removed: both were Jackson 2 names; in
  # Jackson 3 (Boot 4) dates-as-ISO and lenient unknown properties are defaults.

server:
  port: ${SERVER_PORT:8080}

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  bot-username: ${TELEGRAM_BOT_USERNAME:}
  chat-id: ${TELEGRAM_CHAT_ID:}

crawler:
  schedule-cron: "0 0 * * * *"   # каждый час
  enabled: ${CRAWLER_ENABLED:true}

adaptation:
  api-key: ${ANTHROPIC_API_KEY:}
  model: ${ADAPTATION_MODEL:claude-opus-4-8}
  fetch-timeout-seconds: 30

logging:
  level:
    com.jrawler: DEBUG
    org.springframework.data.redis: WARN
